services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: testversionrag-vllm:qwen3.6-v0.19.0
    command:
      - ${RAG_GENERATION_MODEL:-QuantTrio/Qwen3.6-27B-AWQ}
      - --language-model-only
      - --max-model-len
      - ${RAG_VLLM_MAX_MODEL_LEN:-8192}
      - --max-num-seqs
      - ${RAG_VLLM_MAX_NUM_SEQS:-4}
      - --max-cudagraph-capture-size
      - ${RAG_VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE:-4}
      - --gpu-memory-utilization
      - ${RAG_VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --tensor-parallel-size
      - ${RAG_VLLM_TENSOR_PARALLEL_SIZE:-1}
      - --reasoning-parser
      - qwen3
      # Отключаем thinking на уровне сервера. Значение из конкретного запроса
      # всё ещё может переопределить этот безопасный для RAGAS режим по умолчанию.
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
      - --trust-remote-code
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_OFFLINE: ${RAG_HF_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${RAG_HF_OFFLINE:-0}
      VLLM_USE_DEEP_GEMM: ${VLLM_USE_DEEP_GEMM:-0}
      VLLM_USE_FLASHINFER_MOE_FP16: ${VLLM_USE_FLASHINFER_MOE_FP16:-1}
      VLLM_USE_FLASHINFER_SAMPLER: ${VLLM_USE_FLASHINFER_SAMPLER:-0}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s

  app:
    build: .
    env_file:
      - .env
    environment:
      HF_HUB_OFFLINE: ${RAG_HF_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${RAG_HF_OFFLINE:-0}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RAG_COLLECTION: ${RAG_COLLECTION:-documents}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-Octen/Octen-Embedding-0.6B}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RAG_GENERATION_MODEL: ${RAG_GENERATION_MODEL:-QuantTrio/Qwen3.6-27B-AWQ}
      RAG_VLLM_BASE_URL: ${RAG_VLLM_BASE_URL:-http://vllm:8000/v1}
      RAG_VLLM_API_KEY: ${RAG_VLLM_API_KEY:-}
      RAG_VLLM_TIMEOUT: ${RAG_VLLM_TIMEOUT:-120}
      RAGAS_CONTEXT_PRECISION_CONCURRENCY: ${RAGAS_CONTEXT_PRECISION_CONCURRENCY:-5}
      RAG_ENABLE_RERANKER: ${RAG_ENABLE_RERANKER:-true}
      RAG_TRUST_REMOTE_CODE: ${RAG_TRUST_REMOTE_CODE:-true}
      RAG_DOCLING_CHUNK_TOKENS: ${RAG_DOCLING_CHUNK_TOKENS:-512}
      EVALUATION_ARTIFACT_CACHE_ENABLED: ${EVALUATION_ARTIFACT_CACHE_ENABLED:-true}
      # В контейнере кэш разметки должен лежать на подключённом постоянном томе.
      EVALUATION_ARTIFACT_CACHE_DIR: /evaluation/artifact-cache
    volumes:
      - ./src:/app/src:ro
      - ./data:/data:ro
      - ./evaluation:/evaluation
      - hf-cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_healthy

volumes:
  qdrant-data:
  hf-cache:
