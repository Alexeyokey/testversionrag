services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:v0.17.1
    command:
      - ${RAG_GENERATION_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
      - --language-model-only
      - --max-model-len
      - ${RAG_VLLM_MAX_MODEL_LEN:-8192}
      - --max-num-seqs
      - ${RAG_VLLM_MAX_NUM_SEQS:-8}
      - --max-cudagraph-capture-size
      - ${RAG_VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE:-8}
      - --gpu-memory-utilization
      - ${RAG_VLLM_GPU_MEMORY_UTILIZATION:-0.6}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  app:
    build: .
    env_file:
      - .env
    environment:
      HF_HUB_OFFLINE: ${RAG_HF_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${RAG_HF_OFFLINE:-0}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RAG_COLLECTION: ${RAG_COLLECTION:-documents}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-Octen/Octen-Embedding-0.6B}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RAG_GENERATION_MODEL: ${RAG_GENERATION_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
      RAG_VLLM_BASE_URL: ${RAG_VLLM_BASE_URL:-http://vllm:8000/v1}
      RAG_VLLM_API_KEY: ${RAG_VLLM_API_KEY:-}
      RAG_VLLM_TIMEOUT: ${RAG_VLLM_TIMEOUT:-120}
      RAG_ENABLE_RERANKER: ${RAG_ENABLE_RERANKER:-true}
      RAG_TRUST_REMOTE_CODE: ${RAG_TRUST_REMOTE_CODE:-true}
    volumes:
      - ./src:/app/src:ro
      - ./data:/data:ro
      - hf-cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_healthy

volumes:
  qdrant-data:
  hf-cache:
